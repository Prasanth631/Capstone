apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
  namespace: staging
  labels:
    app: devops-platform
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: devops-platform
        environment: staging
    spec:
      containers:
        - name: devops-platform
          image: prasanth631/devops-platform:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "staging"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: devops-platform
  namespace: staging
spec:
  type: ClusterIP
  selector:
    app: devops-platform
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
data:
  SPRING_PROFILES_ACTIVE: "staging"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: staging
type: Opaque
stringData:
  jwt-secret: "stagingSecretKeyThatIsAtLeast256BitsLongForHmacSHA256Algorithm2024!"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
  namespace: staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: staging.devops-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-platform
                port:
                  number: 8082
