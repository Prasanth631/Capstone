apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: default
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: DevOps Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jvm
  namespace: default
data:
  jvm.json: |
    {
      "title": "JVM Metrics",
      "uid": "devops-jvm",
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "gauge", "title": "JVM Heap Used",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 5 },
          "targets": [{ "expr": "jvm_memory_used_bytes{area=\"heap\",application=\"devops-platform\"}", "legendFormat": "Heap Used" }],
          "fieldConfig": { "defaults": { "unit": "bytes", "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":400000000},{"color":"red","value":700000000}] } } }
        },
        {
          "id": 2, "type": "timeseries", "title": "HTTP Request Rate",
          "gridPos": { "x": 6, "y": 0, "w": 9, "h": 5 },
          "targets": [{ "expr": "rate(http_server_requests_seconds_count{application=\"devops-platform\"}[1m])", "legendFormat": "{{uri}} {{status}}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3, "type": "timeseries", "title": "HTTP Response Time (p99)",
          "gridPos": { "x": 15, "y": 0, "w": 9, "h": 5 },
          "targets": [{ "expr": "histogram_quantile(0.99, rate(http_server_requests_seconds_bucket{application=\"devops-platform\"}[5m]))", "legendFormat": "p99 {{uri}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4, "type": "timeseries", "title": "JVM Threads",
          "gridPos": { "x": 0, "y": 5, "w": 8, "h": 5 },
          "targets": [{ "expr": "jvm_threads_live_threads{application=\"devops-platform\"}", "legendFormat": "Live Threads" }]
        },
        {
          "id": 5, "type": "timeseries", "title": "GC Pause Time",
          "gridPos": { "x": 8, "y": 5, "w": 8, "h": 5 },
          "targets": [{ "expr": "rate(jvm_gc_pause_seconds_sum{application=\"devops-platform\"}[1m])", "legendFormat": "{{action}} {{cause}}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 6, "type": "stat", "title": "CPU Usage",
          "gridPos": { "x": 16, "y": 5, "w": 8, "h": 5 },
          "targets": [{ "expr": "process_cpu_usage{application=\"devops-platform\"}", "legendFormat": "CPU" }],
          "fieldConfig": { "defaults": { "unit": "percentunit", "thresholds": { "steps": [{"color":"green","value":null},{"color":"yellow","value":0.6},{"color":"red","value":0.85}] } } }
        }
      ],
      "schemaVersion": 36
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/jvm.json"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:30030"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "publicDashboards"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-jvm
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: "75m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-jvm
          configMap:
            name: grafana-dashboard-jvm
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
