apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: development
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
  namespace: dev
  labels:
    app: devops-platform
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: devops-platform
        environment: dev
    spec:
      containers:
        - name: devops-platform
          image: prasanth631/devops-platform:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: devops-platform
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: devops-platform
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: dev
data:
  SPRING_PROFILES_ACTIVE: "dev"
  APP_NAME: "devops-platform"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: dev
type: Opaque
stringData:
  jwt-secret: "devSecretKeyThatIsAtLeast256BitsLongForHmacSHA256Algorithm2024!"
  db-password: "devops_password"
