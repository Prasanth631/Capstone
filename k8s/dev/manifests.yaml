apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: development
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: dev
data:
  SPRING_PROFILES_ACTIVE: "dev"
  APP_NAME: "devops-platform"
  APP_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
  namespace: dev
  labels:
    app: devops-platform
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: devops-platform
        environment: dev
    spec:
      containers:
        - name: devops-platform
          image: prasanth631/devops-platform:latest
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: JENKINS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jenkins-webhook-secret
            - name: FIREBASE_CONFIG_PATH
              value: /var/run/secrets/firebase/service-account.json
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_CORS_ALLOWED_ORIGINS
          volumeMounts:
            - name: firebase-service-account
              mountPath: /var/run/secrets/firebase
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: firebase-service-account
          secret:
            secretName: firebase-service-account
---
apiVersion: v1
kind: Service
metadata:
  name: devops-platform
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: devops-platform
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-frontend
  namespace: dev
  labels:
    app: devops-frontend
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: devops-frontend
        environment: dev
    spec:
      containers:
        - name: devops-frontend
          image: prasanth631/devops-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: devops-frontend
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: devops-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-platform-ingress
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
    - host: dev.devops-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-frontend
                port:
                  number: 80
