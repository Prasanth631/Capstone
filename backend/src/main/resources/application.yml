server:
  port: 8082

spring:
  application:
    name: devops-platform

  # Default profile: dev (local dev overrides)
  profiles:
    active: dev

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# Firebase Configuration
firebase:
  config-path: ${FIREBASE_CONFIG_PATH:}

# Actuator & Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# CORS
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Jenkins integration
jenkins:
  base-url: ${JENKINS_BASE_URL:}
  username: ${JENKINS_USERNAME:}
  api-token: ${JENKINS_API_TOKEN:}
  webhook-secret: ${JENKINS_WEBHOOK_SECRET:}
  backfill:
    startup-enabled: ${JENKINS_BACKFILL_STARTUP_ENABLED:true}
    default-per-job-limit: ${JENKINS_BACKFILL_DEFAULT_PER_JOB_LIMIT:500}
    skip-if-recent-minutes: ${JENKINS_BACKFILL_SKIP_IF_RECENT_MINUTES:360}

# GitHub
github:
  repo-url: ${GITHUB_REPO_URL:https://github.com/Prasanth631/Capstone}
