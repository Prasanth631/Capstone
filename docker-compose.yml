version: '3.8'

services:
  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=myDockerComposeSecretKeyThatIsAtLeast256BitsLongForDev2024!
      - FIREBASE_CONFIG_PATH=firebase-service-account.json
    networks:
      - devops-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devops-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - devops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  devops-network:
    driver: bridge
