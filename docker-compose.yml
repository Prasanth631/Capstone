services:
  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FIREBASE_CONFIG_PATH=/run/secrets/firebase/firebase-service-account.json
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - JENKINS_WEBHOOK_SECRET=${JENKINS_WEBHOOK_SECRET:-}
      - JENKINS_BASE_URL=${JENKINS_BASE_URL:-http://localhost:8080}
      - GITHUB_REPO_URL=${GITHUB_REPO_URL:-https://github.com/Prasanth631/Capstone}
    volumes:
      - ${FIREBASE_SERVICE_ACCOUNT_FILE:-./secrets/firebase-service-account.json}:/run/secrets/firebase/firebase-service-account.json:ro
    networks:
      devops-network:
        aliases:
          - devops-platform
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_JENKINS_BASE_URL=${VITE_JENKINS_BASE_URL:-http://localhost:8080}
    container_name: devops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - devops-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - devops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  devops-network:
    driver: bridge
